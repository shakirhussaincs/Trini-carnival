<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Estates | Trini Carnival Rentals Admin</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="/admin/js/auth.js"></script>
  <style>
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group-full { grid-column: 1 / -1; }
    input, select, textarea { 
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; 
      font-family: inherit; font-size: 0.9rem; margin-top: 8px;
    }
    label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-gray); }
  </style>
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo">
        <a href="/admin/index.html" class="brand-container">
          <img src="/images/logo.png" alt="Trini Carnival" class="brand-logo">
          <div class="brand-info">
            <div class="brand-title">TRINI CARNIVAL</div>
            <div class="brand-tagline">VILLA RENTALS</div>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
          <a href="/admin/index.html">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Dashboard
          </a>
          <a href="/admin/properties.html" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Manage Estates
          </a>
          <a href="/admin/bookings.html">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Inquiries
          </a>
          <div style="margin-top:auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 5px;">
            <a href="/">
              <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Live Site
            </a>
            <a href="#" onclick="adminLogout()" style="color: rgba(255,100,100,0.6);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </a>
          </div>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1>Estate Inventory</h1>
        <div class="admin-user">Trini Carnival Admin</div>
      </header>

      <section class="admin-content">
        <div class="admin-panel" style="margin-bottom: 40px;">
          <div class="panel-header">
            <h2>Add New Property</h2>
          </div>
          <form id="add-property-form">
            <div class="form-grid">
              <div>
                <label>Property ID (Used for URL, e.g. 'villa-acacia')</label>
                <input type="text" id="p-id" required>
              </div>
              <div>
                <label>Property Name</label>
                <input type="text" id="p-name" required>
              </div>
              <div class="form-group-full">
                <label>Short Tagline</label>
                <input type="text" id="p-tagline" placeholder="Modern Masterpiece | 4 Bed | 4 Bath">
              </div>
              <div>
                <label>Location</label>
                <input type="text" id="p-location" required>
              </div>
              <div>
                <label>Badge (e.g. Featured, Popular, null)</label>
                <input type="text" id="p-badge">
              </div>
              <div>
                <label>Bedrooms</label>
                <input type="number" id="p-beds" required>
              </div>
              <div>
                <label>Bathrooms</label>
                <input type="number" step="0.5" id="p-baths" required>
              </div>
              <div>
                <label>Max Guests</label>
                <input type="number" id="p-cap" required>
              </div>
              <div>
                <label>Price TTD Range</label>
                <input type="text" id="p-ttd" placeholder="$3200 - $3500 TTD">
              </div>
              <div class="form-group-full">
                <label>Property Images (Upload one or multiple. First image will be Featured)</label>
                <input type="file" id="p-image" accept="image/*" multiple required>
              </div>
              <div class="form-group-full">
                <label>Description</label>
                <textarea id="p-desc" rows="3"></textarea>
              </div>
            </div>
            <div style="margin-top: 30px; text-align: right;">
              <button type="submit" class="btn btn-primary">Publish Estate</button>
            </div>
          </form>
        </div>

        <div class="admin-panel">
          <div class="panel-header">
            <h2>Existing Estates</h2>
            <button class="btn" onclick="fetchProperties()">Refresh List</button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Location</th>
                  <th>Beds</th>
                  <th>Guests</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="properties-tbody">
                <tr><td colspan="6" style="text-align:center;">Fetching inventory...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

<script src="/js/supabaseClient.js"></script>
<script src="/admin/js/admin.js"></script>
</body>
</html>
