<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Trini Carnival Rentals</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
    }
    .login-container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 60px;
      border-radius: 40px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }
    .login-logo {
      width: 180px;
      filter: brightness(0) invert(1);
      margin-bottom: 40px;
    }
    .login-header h2 {
      color: #fff;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .login-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 40px;
    }
    .form-group {
      margin-bottom: 25px;
      text-align: left;
    }
    .form-group label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 18px 25px;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }
    .login-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(225, 29, 72, 0.4);
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div style="background: #fff; padding: 20px; border-radius: 20px; display: inline-block; margin-bottom: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.15);">
      <img src="/images/logo.png" alt="Trini Carnival Rentals" style="width: 120px; display: block;">
    </div>
    <div class="login-header">
      <h2>Restricted Access</h2>
      <p>Please authenticate to access the concierge dashboard.</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Secure Login</button>
      <div class="error-msg" id="error-msg">Invalid credentials. Access Denied.</div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      
      // Hardcoded Credentials
      if (u === 'admin' && p === 'trini2026') {
        localStorage.setItem('admin_auth', 'true');
        window.location.href = '/admin/index.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
