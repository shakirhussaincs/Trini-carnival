<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Inquiries | Luxury Escapes Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo">LUXURY <span>Escapes</span></div>
      <nav class="sidebar-nav">
        <a href="index.html">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="bookings.html" class="active">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Inquiries
        </a>
        <div style="margin-top:auto; padding: 1rem 0;">
          <a href="/">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Live Site
          </a>
        </div>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1>Booking Inquiries</h1>
        <div class="admin-user">Concierge Admin</div>
      </header>

      <section class="admin-content">
        <div class="admin-panel">
          <div class="panel-header">
            <h2>Current Requests</h2>
            <button class="btn btn-primary" onclick="fetchBookings()">Refresh List</button>
          </div>
          
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Guest / Contact</th>
                  <th>Property</th>
                  <th>Dates</th>
                  <th>Guests</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bookings-tbody">
                <tr><td colspan="7" style="text-align:center;">Synchronizing with server...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Booking Detail Modal Component -->
  <div class="modal-overlay" id="booking-modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <div class="modal-header">
        <h2>Inquiry Details <span id="modal-id" style="color:var(--text-light); font-size: 1rem; margin-left:10px;"></span></h2>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Injected via JS -->
      </div>
      <div class="modal-footer" id="modal-footer">
        <!-- Actions via JS -->
      </div>
    </div>
  </div>

<script src="js/admin.js"></script>
</body>
</html>
